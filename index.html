// ── Time helpers ──────────────────────────────────────────────────────────
function weekBounds(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7) + offset * 7);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { start: monday, end: sunday };
}

function weekLabel(offset) {
  if (offset === 0) return 'This week';
  if (offset === -1) return 'Last week';
  const { start, end } = weekBounds(offset);
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return fmt(start) + ' – ' + fmt(end);
}

function periodKey(channel, date) {
  const d = date || new Date();
  if (channel.cadence === 'weekly') {
    const day = d.getDay();
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((day + 6) % 7));
    return `week-${monday.toISOString().slice(0,10)}`;
  } else {
    return `month-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
}

function periodLabel(channel, date) {
  const d = date || new Date();
  if (channel.cadence === 'weekly') {
    const day = d.getDay();
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((day + 6) % 7));
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const fmt = x => x.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `Week of ${fmt(monday)}`;
  } else {
    return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }
}

function channelAU(channelId, offset) {
  const { start, end } = weekBounds(offset);
  return entries
    .filter(e => e.channelId === channelId && e.ts >= start.getTime() && e.ts <= end.getTime())
    .reduce((s, e) => s + e.au, 0);
}

function todayAU(channelId) {
  const now = new Date();
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const endOfDay = startOfDay + 86400000;
  return entries
    .filter(e => e.channelId === channelId && e.ts >= startOfDay && e.ts < endOfDay)
    .reduce((s, e) => s + e.au, 0);
}

function auScore(min, intensity) {
  return Math.round((min / 30) * (intensity / 10) * 5 * 100) / 100;
}

function auToFaderPct(au) {
  if (au <= 0) return 0;
  return Math.sqrt(Math.min(au, AU_CEIL) / AU_CEIL);
}

function paceStatus(channel, au) {
  const now = new Date();
  let pctElapsed;
  if (channel.cadence === 'weekly') {
    const day = now.getDay();
    const dayOfWeek = day === 0 ? 7 : day;
    pctElapsed = (dayOfWeek - 1) / 7;
  } else {
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    pctElapsed = (now.getDate() - 1) / daysInMonth;
  }
  const expected = channel.goal * pctElapsed;
  if (au === 0 && pctElapsed > 0.2) return 'neglected';
  if (au > channel.goal) return 'overflow';
  if (au >= expected * 0.8) return 'on-track';
  if (au >= expected * 0.4) return 'at-risk';
  return 'neglected';
}

// ── Firebase ──────────────────────────────────────────────────────────────
async function loadFromFirebase() {
  try {
    showToast('Loading data…');
    const eSnap = await getDocs(query(collection(db, 'attention-mixer-entries'), orderBy('ts', 'desc')));
    entries = eSnap.docs.map(d => ({ fbId: d.id, ...d.data() }));
    const sSnap = await getDocs(collection(db, 'attention-mixer-snapshots'));
    snapshots = sSnap.docs.map(d => ({ fbId: d.id, ...d.data() }));
    render();
    showToast('Data loaded ✓', 'ok');
  } catch(e) {
    showToast('Could not load Firebase data', 'err');
    console.error(e);
  }
}

async function saveEntry(entry) {
  try {
    const ref = await addDoc(collection(db, 'attention-mixer-entries'), entry);
    entry.fbId = ref.id;
    return true;
  } catch(e) {
    console.error(e);
    return false;

}

// ── Snapshot logic ────────────────────────────────────────────────────────
async function checkAndCreateSnapshots() {
  const now = new Date();
  for (const ch of CHANNELS) {
    const key = periodKey(ch, now);
    const prevDate = new Date(now);
    if (ch.cadence === 'weekly') {
      prevDate.setDate(prevDate.getDate() - 7);
    } else {
      prevDate.setMonth(prevDate.getMonth() - 1);
    }
    const prevKey = periodKey(ch, prevDate);
    const snapId = `${ch.id}-${prevKey}`;
    const exists = snapshots.find(s => s.id === snapId);
    if (exists) continue;
    const { start, end } = ch.cadence === 'weekly'
      ? weekBounds(-1)
      : { start: new Date(prevDate.getFullYear(), prevDate.getMonth(), 1), end: new Date(prevDate.getFullYear(), prevDate.getMonth()+1, 0, 23, 59, 59) };
    const periodEntries = entries.filter(e =>
      e.channelId === ch.id && e.ts >= start.getTime() && e.ts <= end.getTime()
    );
    if (periodEntries.length === 0 && ch.cadence === 'weekly') {
      // still record zero snapshot
    }
    const totalAU = periodEntries.reduce((s, e) => s + e.au, 0);
    const totalMinutes = periodEntries.reduce((s, e) => s + e.minutes, 0);
    const sessions = periodEntries.length;
    const avgIntensity = sessions ? +(periodEntries.reduce((s, e) => s + e.intensity, 0) / sessions).toFixed(1) : 0;
    const enjoyedPct = sessions ? Math.round(periodEntries.filter(e => e.enjoyed).length / sessions * 100) : 0;
    const tagCounts = {};
    periodEntries.forEach(e => (e.tags||[]).forEach(t => tagCounts[t] = (tagCounts[t]||0)+1));
    const dominantTag = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
    const snapshot = {
      id: snapId, channelId: ch.id, periodKey: prevKey,
      periodLabel: periodLabel(ch, prevDate),
      periodStart: start.toISOString(), periodEnd: end.toISOString(),
      totalAU, totalMinutes, sessions, avgIntensity, enjoyedPct, dominantTag,
      createdAt: Date.now()
    };
    try {
      await setDoc(doc(db, 'attention-mixer-snapshots', snapId), snapshot);
      snapshots.push({ fbId: snapId, ...snapshot });
      await postSnapshotToSmartsheet(snapshot, ch);
    } catch(e) { console.error(e); }
  }
}

function getChannelHistory(channelId, months) {
  const ch = CHANNELS.find(c => c.id === channelId);
  if (!ch) return [];
  const now = new Date();
  const result = [];
  if (ch.cadence === 'weekly') {
    for (let w = months * 4; w >= 1; w--) {
      const d = new Date(now);
      d.setDate(d.getDate() - w * 7);
      const key = periodKey(ch, d);
      const snap = snapshots.find(s => s.channelId === channelId && s.periodKey === key);
      result.push({ label: periodLabel(ch, d), au: snap ? snap.totalAU : 0, key });
    }
  } else {
    for (let m = months - 1; m >= 0; m--) {
      const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
      const key = periodKey(ch, d);
      const snap = snapshots.find(s => s.channelId === channelId && s.periodKey === key);
      result.push({ label: periodLabel(ch, d), au: snap ? snap.totalAU : 0, key });
    }
  }
  return result;
}

    <div class="metric"><div class="metric-label">Enjoyed</div><div class="metric-value" style="color:#0F6E56;">${enjoyPct}</div></div>`;

function renderMixer() {
  const mx = document.getElementById('mixer');
  mx.innerHTML = '';

  // Two rows: weekly (priority left, regular right), monthly (priority left, regular right)
  const weekly  = [
    ...CHANNELS.filter(c => c.cadence === 'weekly'  && c.priority === 1),
    ...CHANNELS.filter(c => c.cadence === 'weekly'  && c.priority === 2),
  ];
  const monthly = [
    ...CHANNELS.filter(c => c.cadence === 'monthly' && c.priority === 1),
    ...CHANNELS.filter(c => c.cadence === 'monthly' && c.priority === 2),
  ];

  function makeRow(label, channels) {
    if (!channels.length) return;
    const section = document.createElement('div');
    section.className = 'mixer-section';
    const sLabel = document.createElement('div');
    sLabel.className = 'section-label';
    sLabel.textContent = label;
    section.appendChild(sLabel);
    const row = document.createElement('div');
    row.className = 'channel-row';
    channels.forEach(ch => {
      const vol = channelAU(ch.id, weekOffset);
      row.appendChild(makeChannel(ch, vol, ch.priority === 1));
    });
    section.appendChild(row);
    mx.appendChild(section);
  }

  makeRow('Weekly', weekly);
  makeRow('Monthly', monthly);
}

function makeChannel(ch, vol, isPriority) {
  const isOverflow = vol > AU_CEIL;
  const isZero = vol === 0;
  const status = paceStatus(ch, vol);
  const c = COLORS[ch.cadence];
  const fillColor = isOverflow ? c.overflow : (vol < AU_CEIL * 0.15 ? c.low : (ch.priority === 1 ? c.p1 : c.p2));
  const pct = auToFaderPct(vol);
  const fH = isPriority ? FADER_H * 2 : FADER_H;
  const fillPx = Math.max(Math.round(pct * fH), isZero ? 0 : 2);

  const tubeW = isPriority ? 40 : 24;
  const ticksHTML = TICK_AU.map(t => {
    const tPct = auToFaderPct(t);
    const bottomPx = Math.round(tPct * fH);
    return `<div class="tick" style="bottom:${bottomPx}px;left:0;right:0;">
      <div class="tick-line"></div>
      <div class="tick-val">${t}</div>
    </div>`;
  }).join('');

  // Goal line
  const goalPct = auToFaderPct(ch.goal);
  const goalPx = Math.round(goalPct * fH);
  const goalLine = `<div class="goal-line" style="bottom:${goalPx}px;" title="Weekly goal: ${ch.goal} AU"></div>`;

  // Today indicator
  const todayVal = todayAU(ch.id);
  const todayPct = auToFaderPct(todayVal);
  const todayPx = Math.round(todayPct * fH);
  const todayLine = todayVal > 0
    ? `<div class="today-line" style="bottom:${todayPx}px;" title="Today: ${todayVal.toFixed(1)} AU"></div>`
    : '';

  const statusDot = status === 'neglected' ? '<div class="alert-dot" title="Needs attention"></div>'
    : status === 'overflow' ? '<div class="overflow-dot" title="Overflow"></div>'
    : status === 'at-risk' ? '<div class="risk-dot" title="At risk"></div>' : '';

  const el = document.createElement('div');
  el.className = 'channel' + (isPriority ? ' priority' : '') + (selectedChannel === ch.id ? ' selected' : '');
  el.dataset.channelId = ch.id;

  el.innerHTML = `
    ${statusDot}
    <div class="ch-name">${ch.name}</div>
    <div class="fader-outer" style="height:${fH}px;width:${tubeW+12}px;">
      ${ticksHTML}
      ${goalLine}
      ${todayLine}
      <div class="fader-wrap" style="height:${fH}px;width:${tubeW}px;">
        <div class="fader-fill" style="height:${fillPx}px;background:${fillColor};border-radius:12px;"></div>
      </div>
    </div>
    <div class="vol-label" style="color:${isOverflow?'#BA7517':isZero?'#A32D2D':'var(--color-text-primary)'};">${vol.toFixed(1)}</div>
    ${todayVal > 0 ? `<div class="today-label">+${todayVal.toFixed(1)} today</div>` : ''}
    <div class="goal-label">${ch.goal} AU goal</div>
    <span class="cadence-badge cadence-${ch.cadence}">${ch.label}</span>
    ${isZero ? '<div class="zero-warn">needs attn</div>' : ''}
    ${isOverflow ? '<div class="overflow-warn">overflow</div>' : ''}
  `;

  el.onclick = () => openLog(ch.id);

  // Hover sparkline
  el.addEventListener('mouseenter', (e) => showSparkline(ch, e.currentTarget));
  el.addEventListener('mouseleave', () => hideSparkline());

  return el;
}

// ── Sparkline ─────────────────────────────────────────────────────────────
function showSparkline(ch, el) {
  const history = getChannelHistory(ch.id, 6);
  const popup = document.getElementById('sparkline-popup');
  const canvas = document.getElementById('sparkline-canvas');
  popup.querySelector('.spark-title').textContent = ch.name + ' — last 6 months';

  if (sparklineChart) { sparklineChart.destroy(); sparklineChart = null; }

  const c = COLORS[ch.cadence];
  const color = ch.priority === 1 ? c.p1 : c.p2;

  sparklineChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: history.map(h => h.label),
      datasets: [{
        data: history.map(h => h.au),
        backgroundColor: history.map(h => h.au >= ch.goal ? color : c.low),
        borderRadius: 3,
      }]
    },
    options: {
      responsive: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => `${ctx.raw.toFixed(1)} AU` }
        }
      },
      scales: {
        x: { ticks: { font: { size: 9 }, maxRotation: 45 }, grid: { display: false } },
        y: { ticks: { font: { size: 9 } }, grid: { color: 'rgba(0,0,0,0.05)' },
          suggestedMax: Math.max(ch.goal * 1.2, ...history.map(h => h.au), 1) }
      }
    }
  });

  const rect = el.getBoundingClientRect();
  const scrollY = window.scrollY;
  popup.style.display = 'block';
  popup.style.left = (rect.right + 8) + 'px';
  popup.style.top = (rect.top + scrollY) + 'px';

  // Adjust if off screen
  setTimeout(() => {
    const pr = popup.getBoundingClientRect();
    if (pr.right > window.innerWidth - 10) {
      popup.style.left = (rect.left - pr.width - 8) + 'px';
    }
  }, 0);
}

function hideSparkline() {
  document.getElementById('sparkline-popup').style.display = 'none';
}

// ── Bottom chart ──────────────────────────────────────────────────────────
function toggleBottomChart() {
  bottomChartVisible = !bottomChartVisible;
  document.getElementById('bottom-chart-section').style.display = bottomChartVisible ? 'block' : 'none';
  document.getElementById('chart-toggle-btn').innerHTML = bottomChartVisible
    ? '<i class="ti ti-chart-line"></i> Hide trends'
    : '<i class="ti ti-chart-line"></i> Show trends';
  if (bottomChartVisible) renderBottomChart();
}

function renderBottomChart() {
  const canvas = document.getElementById('bottom-chart-canvas');
  if (bottomChart) { bottomChart.destroy(); bottomChart = null; }

  const months = 6;
  const now = new Date();
  const labels = [];
  for (let m = months - 1; m >= 0; m--) {
    const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
    labels.push(d.toLocaleDateString('en-US', { month: 'short', year:'2-digit' }));
  }

  const datasets = CHANNELS.map((ch, i) => {
    const history = getChannelHistory(ch.id, months);
    // For weekly channels, aggregate by month
    let monthlyData;
    if (ch.cadence === 'weekly') {
      monthlyData = [];
      for (let m = months - 1; m >= 0; m--) {
        const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
        const monthKey = `month-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        // sum up weekly snapshots in that month
        const monthSnaps = snapshots.filter(s =>
          s.channelId === ch.id && s.periodKey.startsWith('week-') &&
          s.periodKey.slice(5, 12) === monthKey.slice(6, 13)
        );
        monthlyData.push(monthSnaps.reduce((sum, s) => sum + s.totalAU, 0));
      }
    } else {
      monthlyData = history.map(h => h.au);
    }

    return {
      label: ch.name,
      data: monthlyData,
      borderColor: CHART_COLORS[i % CHART_COLORS.length],
      backgroundColor: 'transparent',
      borderWidth: ch.priority === 1 ? 3 : 1.5,
      pointRadius: ch.priority === 1 ? 4 : 2,
      tension: 0.3
    };
  });

  bottomChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 11 }, boxWidth: 20, padding: 10,
            generateLabels: (chart) => chart.data.datasets.map((ds, i) => ({
              text: ds.label,
              fillStyle: ds.borderColor,
              strokeStyle: ds.borderColor,
              lineWidth: ds.borderWidth,
              fontStyle: CHANNELS[i].priority === 1 ? 'bold' : 'normal',
              hidden: false, index: i, datasetIndex: i
            }))
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.04)' } },
        y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { callback: v => v + ' AU' } }
      }
    }
  });
}

// ── Log panel ─────────────────────────────────────────────────────────────
function openLog(channelId) {
  selectedChannel = channelId;
  const ch = CHANNELS.find(c => c.id === channelId);
  document.getElementById('log-title').textContent = 'Log attention → ' + ch.name;
  activeTags = new Set();
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('enjoy-box').checked = false;
  document.getElementById('enjoy-label').classList.remove('checked');
  document.getElementById('log-notes').value = '';
  document.getElementById('log-min').value = 30;
  document.getElementById('log-int').value = 5;
  document.getElementById('int-display').textContent = '5/10';
  updateAUPreview();
  openPanel('log-panel');
}

function openPanel(id) {
  const el = document.getElementById(id);
  if (el) {
    ['log-panel','manage-panel','settings-panel'].forEach(p => {
      const pe = document.getElementById(p);
      if (pe) pe.classList.toggle('open', p === id);
    });
  }
  render();
}

function togglePanel(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const wasOpen = el.classList.contains('open');
  closeAll();
  if (!wasOpen) el.classList.add('open');
}

function closeAll() {
  selectedChannel = null;
  ['log-panel','manage-panel','settings-panel'].forEach(p => {
    const el = document.getElementById(p);
    if (el) el.classList.remove('open');
  });
  render();
}

function updateAUPreview() {
  const min = parseInt(document.getElementById('log-min').value) || 30;
  const intensity = parseInt(document.getElementById('log-int').value) || 5;
  const au = auScore(min, intensity);
  document.getElementById('au-preview').textContent = au.toFixed(2) + ' AU';
  const ctx = au >= AU_CEIL ? '— overflow!'
    : au >= 75 ? '— upper third'
    : au >= 50 ? '— past halfway'
    : au >= 25 ? '— past first tick'
    : '— below first tick';
  document.getElementById('au-context').textContent = ctx;
}

function toggleTag(el, tag) {
  if (activeTags.has(tag)) { activeTags.delete(tag); el.classList.remove('active'); }
  else { activeTags.add(tag); el.classList.add('active'); }
}

function toggleEnjoy() {
  const cb = document.getElementById('enjoy-box');
  cb.checked = !cb.checked;
  document.getElementById('enjoy-label').classList.toggle('checked', cb.checked);
}

function setFilter(el, f) {
  logFilter = f;
  document.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLog();
}

async function submitEntry() {
  const min = parseInt(document.getElementById('log-min').value) || 30;
  const intensity = parseInt(document.getElementById('log-int').value) || 5;
  const notes = document.getElementById('log-notes').value.trim();
  const enjoyed = document.getElementById('enjoy-box').checked;
  const au = auScore(min, intensity);
  const ch = CHANNELS.find(c => c.id === selectedChannel);

  const entry = {
    channelId: selectedChannel,
    channelName: ch.name,
    cadence: ch.cadence,
    minutes: min, intensity, tags: Array.from(activeTags),
    enjoyed, notes, au, ts: Date.now(), ssStatus: null
  };

  showToast('Saving…');
  // Save to Firebase (don't block on result)
  saveEntry(entry).catch(e => console.error('Firebase save error:', e));
  entries.unshift(entry);
  entry.ssStatus = 'pending';
  closeAll();
  render();
  // Post to Smartsheet via Make webhook
  try {
    await postEntryToSmartsheet(entry, ch);
    entry.ssStatus = 'ok';
  } catch(e) {
    entry.ssStatus = 'fail';
    console.error('Webhook error:', e);
  }
  showToast('Saved ✓', 'ok');
  render();
}

function renderLog() {
  const ll = document.getElementById('log-list');
  if (!entries.length) {
    ll.innerHTML = '<div class="empty-log">No entries yet. Click any channel to log attention.</div>';
    return;
  }
  const { start, end } = weekBounds(weekOffset);
  let filtered = [...entries].sort((a, b) => b.ts - a.ts);
  if (logFilter === 'this-week') filtered = filtered.filter(e => e.ts >= start.getTime() && e.ts <= end.getTime());
  else if (logFilter === 'obstacle') filtered = filtered.filter(e => e.tags && e.tags.includes('obstacle'));
  else if (logFilter === 'enjoyed') filtered = filtered.filter(e => e.enjoyed);
  if (!filtered.length) { ll.innerHTML = '<div class="empty-log">No entries match this filter.</div>'; return; }
  ll.innerHTML = filtered.slice(0, 50).map(e => {
    const ch = CHANNELS.find(x => x.id === e.channelId);
    const d = new Date(e.ts);
    const ds = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + ' at ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    const tagPills = (e.tags || []).map(t => `<span class="tag-pill">${t}</span>`).join('');
    const enjoyPill = e.enjoyed ? '<span class="enjoy-pill"><i class="ti ti-heart"></i> enjoyed</span>' : '';
    return `<div class="entry">
      <div class="entry-au">${e.au.toFixed(2)}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;">
          <span class="entry-proj">${ch ? ch.name : e.channelName || '—'}</span>
          <span class="entry-date">${ds}</span>
        </div>
        <div class="entry-meta">${e.minutes}min · ${e.intensity}/10 ${tagPills} ${enjoyPill}</div>
        ${e.notes ? `<div class="entry-notes">${e.notes}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function exportCSV() {
  const rows = [['Channel','Cadence','Date','Time','Minutes','Intensity','AU','Tags','Enjoyed','Notes']];
  for (const e of [...entries].sort((a, b) => b.ts - a.ts)) {
    const d = new Date(e.ts);
    rows.push([e.channelName, e.cadence, d.toLocaleDateString(), d.toLocaleTimeString(),
      e.minutes, e.intensity, e.au.toFixed(2), (e.tags||[]).join(';'),
      e.enjoyed?'Yes':'No', e.notes]);
  }
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv,' + encodeURIComponent(csv);
  a.download = 'attention-log.csv';
  a.click();
}

function shiftWeek(dir) {
  if (dir > 0 && weekOffset >= 0) return;
  weekOffset += dir;
  render();
}

async function testWebhookPing(type) {
  const pingType = type || 'entry';
  showToast('Sending ' + pingType + ' ping to Make…');
  try {
    const payload = pingType === 'snapshot' ? {
      type: 'snapshot',
      sheetId: SS_LOG_SHEET,
      dashSheetId: SS_DASH_SHEET,
      channel: 'Intake',
      cadence: 'weekly',
      period: 'Week of Jun 16',
      periodStart: '2026-06-16T00:00:00.000Z',
      periodEnd: '2026-06-22T23:59:59.999Z',
      totalAU: 28.5,
      totalMinutes: 180,
      sessions: 6,
      avgIntensity: 7.2,
      enjoyedPct: 83,
      dominantTag: 'progress',
      goal: 10,
      priority: 1
    } : {
      type: 'entry',
      sheetId: SS_LOG_SHEET,
      channel: 'Intake',
      cadence: 'weekly',
      period: 'Week of Jun 23',
      periodKey: 'week-2026-06-23',
      datetime: new Date().toISOString(),
      date: 'Jun 23, 2026',
      time: '10:00 AM',
      minutes: 30,
      intensity: 7,
      au: 3.5,
      tags: 'progress',
      enjoyed: 'Yes',
      notes: 'Test entry for Make field detection'
    };
    await fetch(WEBHOOK, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    showToast(pingType + ' ping sent ✓ — check Make', 'ok');
  } catch(e) {
    showToast('Ping failed', 'err');
  }
}

// Expose to window
window.shiftWeek = shiftWeek;
window.togglePanel = togglePanel;
window.closeAll = closeAll;
window.toggleTag = toggleTag;
window.toggleEnjoy = toggleEnjoy;
window.updateAUPreview = updateAUPreview;
window.submitEntry = submitEntry;
window.setFilter = setFilter;
window.exportCSV = exportCSV;
window.toggleBottomChart = toggleBottomChart;
window.testWebhookPing = testWebhookPing;

// Init
loadFromFirebase();
</script>

    <div class="legend-item"><div class="legend-swatch" style="background:#378ADD;"></div> Weekly</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#085041;"></div> Monthly priority</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#1D9E75;"></div> Monthly</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#BA7517;"></div> Overflow</div>
    <div class="legend-item"><div class="goal-line-legend"></div> Weekly goal</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E24B4A;border-radius:50%;"></div> Needs attn</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E89C2D;border-radius:50%;"></div> At risk</div>
    <div class="legend-item"><div style="width:20px;border-top:2px solid #7B3FA0;"></div> Today's AU</div>
  </div>

  <div id="mixer"></div>

  <!-- LOG PANEL -->
  <div class="panel" id="log-panel">
    <h3 id="log-title">Log attention</h3>
    <div class="form-grid">
      <div class="field">
        <label>Duration (minutes)</label>
        <input type="number" id="log-min" value="30" min="1" max="480" step="5" oninput="updateAUPreview()">
      </div>
      <div class="field">
        <label>Intensity &nbsp;<span id="int-display" style="font-weight:500;color:var(--color-text-primary);">5/10</span></label>
        <div class="slider-row">
          <input type="range" min="1" max="10" value="5" step="1" id="log-int" oninput="document.getElementById('int-display').textContent=this.value+'/10';updateAUPreview()">
        </div>
      </div>
    </div>
    <div class="field" style="margin-bottom:8px;">
      <label style="margin-bottom:6px;display:block;">Tags &nbsp;<span style="font-size:11px;color:var(--color-text-secondary);">(select all that apply)</span></label>
      <div class="tag-wrap">
        <button class="tag-btn" onclick="toggleTag(this,'progress')"><i class="ti ti-arrow-up-right"></i> Progress</button>
        <button class="tag-btn" onclick="toggleTag(this,'planning')"><i class="ti ti-map"></i> Planning</button>
        <button class="tag-btn" onclick="toggleTag(this,'review')"><i class="ti ti-eye"></i> Review</button>
        <button class="tag-btn" onclick="toggleTag(this,'obstacle')"><i class="ti ti-barrier-block"></i> Obstacle</button>
        <button class="tag-btn" onclick="toggleTag(this,'admin')"><i class="ti ti-briefcase"></i> Admin</button>
      </div>
    </div>
    <label id="enjoy-label" class="enjoy-check" onclick="toggleEnjoy()">
      <input type="checkbox" id="enjoy-box" onclick="event.stopPropagation();document.getElementById('enjoy-label').classList.toggle('checked',this.checked)">
      <i class="ti ti-heart" style="font-size:15px;"></i>
      <span>I enjoyed this work</span>
    </label>
    <div class="field" style="margin-bottom:10px;">
      <label>Notes (optional)</label>
      <textarea id="log-notes" placeholder="What happened? Any blockers? What moved forward?"></textarea>
    </div>
    <div class="au-preview-box">
      (minutes ÷ 30) × (intensity ÷ 10) × 5 → <span id="au-preview" style="font-weight:500;font-size:13px;color:var(--color-text-primary);"></span>
      <span id="au-context" style="margin-left:6px;"></span>
    </div>
    <div class="btn-row">
      <button class="btn-s" onclick="closeAll()">Cancel</button>
      <button class="btn-p" onclick="submitEntry()">Save</button>
    </div>
  </div>

  <!-- BOTTOM CHART -->
  <div class="bottom-chart-section" id="bottom-chart-section" style="display:none;">
    <h3>AU trends — last 6 months</h3>
    <canvas id="bottom-chart-canvas" height="350"></canvas>
  </div>

  <!-- LOG -->
  <div class="log-section">
    <div class="log-header">
      <h3>Attention log</h3>
      <div class="log-filters">
        <button class="log-filter-btn active" onclick="setFilter(this,'all')">All</button>
        <button class="log-filter-btn" onclick="setFilter(this,'this-week')">This week</button>
        <button class="log-filter-btn" onclick="setFilter(this,'obstacle')">Obstacles</button>
        <button class="log-filter-btn" onclick="setFilter(this,'enjoyed')"><i class="ti ti-heart"></i> Enjoyed</button>
      </div>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<!-- Sparkline popup -->
<div id="sparkline-popup">
  <div class="spark-title"></div>
  <canvas id="sparkline-canvas" width="260" height="140"></canvas>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
